apiVersion: v1
kind: Namespace
metadata:
  name: cnra-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cnra-mvp
  namespace: cnra-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cnra-mvp-read-only
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cnra-mvp-read-only
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cnra-mvp-read-only
subjects:
  - kind: ServiceAccount
    name: cnra-mvp
    namespace: cnra-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cnra-mvp
  namespace: cnra-system
  labels:
    app: cnra-mvp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cnra-mvp
  template:
    metadata:
      labels:
        app: cnra-mvp
    spec:
      serviceAccountName: cnra-mvp
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: cnra-mvp
          image: sukumar9/cnra-mvp-image:0.2.2
          imagePullPolicy: IfNotPresent
          env:
            - name: CNRA_NAMESPACE
              value: "all"
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: cnra-mvp
  namespace: cnra-system
spec:
  selector:
    app: cnra-mvp
  ports:
    - name: http
      port: 80
      targetPort: http
